<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #181c26; --card: #1e2333; --border: #2a3045;
  --accent: #4f8ef7; --accent2: #34d399; --accent3: #f97316; --danger: #f43f5e;
  --text: #e8eaf0; --muted: #7b82a0; --header-bg: #1a2140; --total-bg: #232b44;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; font-size: 13px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 700; color: var(--accent); }
.topbar-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.spacer { flex: 1; }
.sync-status { font-size: 10px; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); color: var(--muted); }
.sync-status.synced { border-color: var(--accent2); color: var(--accent2); }
.sync-status.syncing { border-color: var(--accent3); color: var(--accent3); }
.sync-status.error { border-color: var(--danger); color: var(--danger); }
.reset-btn { font-size: 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'Sora', sans-serif; }
.reset-btn:hover { border-color: var(--danger); color: var(--danger); }
.tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; white-space: nowrap; padding: 0 8px; }
.tab { padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: 0.04em; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab.locked { color: var(--accent2); }
.tab.locked.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.main { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.budget-panel { flex: 1; overflow-y: auto; padding: 14px; min-width: 0; }
.chat-panel { width: 290px; min-width: 290px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
.chat-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.chat-dot { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.form-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.form-select, .form-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 12px; padding: 8px 10px; outline: none; width: 100%; }
.form-select:focus, .form-input:focus { border-color: var(--accent); }
.form-select option { background: var(--card); }
.form-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; padding: 10px; width: 100%; margin-top: 4px; }
.form-btn:hover { background: #3a7de8; }
#formMsg { font-size: 11px; padding: 6px 8px; border-radius: 6px; min-height: 20px; }
#formMsg.success { background: #0d2a20; border: 1px solid var(--accent2); color: var(--accent2); }
#formMsg.error { background: #2d1a1f; border: 1px solid var(--danger); color: #ff8099; }
.launch-history { border-top: 1px solid var(--border); padding: 10px 12px; max-height: 200px; overflow-y: auto; flex-shrink: 0; }
.launch-history h4 { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.history-item { font-size: 11px; color: var(--text); padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.history-item:last-child { border-bottom: none; }
.h-name { color: var(--muted); font-size: 10px; }
.h-val { color: var(--accent2); font-family: 'DM Mono', monospace; white-space: nowrap; }
.month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-title { font-size: 15px; font-weight: 700; color: var(--accent); }
.month-badge { font-size: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--muted); }
.month-badge.locked { border-color: var(--accent2); color: var(--accent2); }
.summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.s-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
.s-value { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.c-a{color:var(--accent)} .c-b{color:var(--accent3)} .c-c{color:var(--accent2)} .c-d{color:var(--danger)} .c-m{color:var(--muted)}
.payment-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
.payment-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; text-align: center; }
.p-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.p-value { font-family: 'DM Mono', monospace; font-size: 11px; }
.section { margin-bottom: 10px; }
.section-title { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
table { width: 100%; min-width: 360px; border-collapse: collapse; background: var(--card); }
thead tr { background: var(--header-bg); }
thead th { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 7px 10px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); }
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover:not(.total-row) { background: #232840; }
td { padding: 6px 10px; font-family: 'DM Mono', monospace; font-size: 11px; text-align: right; white-space: nowrap; color: var(--text); }
td:first-child { text-align: left; font-family: 'Sora', sans-serif; font-size: 11px; }
.total-row { background: var(--total-bg); }
.total-row td { font-weight: 600; font-size: 11px; padding: 7px 10px; color: var(--accent2); }
.total-row td:first-child { font-family: 'Sora', sans-serif; }
.zero{color:var(--muted)} .pos{color:var(--accent2)} .neg{color:var(--danger)} .amt{color:var(--accent3)}
.annual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 8px; margin-bottom: 16px; }
.annual-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px; cursor: pointer; transition: border-color 0.15s; }
.annual-card:hover { border-color: var(--accent); }
.a-month { font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.a-row { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; margin-bottom: 2px; }
.a-lbl { color: var(--muted); }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .chat-panel { width: 100%; min-width: unset; border-left: none; border-top: 1px solid var(--border); height: 320px; min-height: 320px; }
  .budget-panel { flex: 1; min-height: 0; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">💰 Orçamento 2026</div>
    <div class="topbar-sub">Controle pessoal de gastos</div>
  </div>
  <div class="spacer"></div>
  <div class="sync-status" id="syncStatus">⏳ Conectando...</div>
  <button class="reset-btn" onclick="resetAll()">⚠ Resetar</button>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="main">
  <div class="budget-panel" id="budgetPanel"></div>
  <div class="chat-panel">
    <div class="chat-header"><div class="chat-dot"></div> Lançamentos</div>
    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Mês do lançamento</label>
        <select class="form-select" id="fMonth" onchange="populateCats()"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="fCat" onchange="updateSubcats()"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Subcategoria</label>
        <select class="form-select" id="fSub"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="fVal" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Meio de pagamento</label>
        <select class="form-select" id="fPay">
          <option>Crédito</option>
          <option>VR</option>
          <option>VA</option>
          <option>Dinheiro</option>
        </select>
      </div>
      <button class="form-btn" onclick="submitLaunch()">✓ Lançar</button>
      <div id="formMsg"></div>
    </div>
    <div class="launch-history" id="launchHistory"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRUFng6ciiultUcWtbIl-ePavDzir2_Fg",
  authDomain: "orcamento2026-8bfd2.firebaseapp.com",
  databaseURL: "https://orcamento2026-8bfd2-default-rtdb.firebaseio.com",
  projectId: "orcamento2026-8bfd2",
  storageBucket: "orcamento2026-8bfd2.firebasestorage.app",
  messagingSenderId: "683337548594",
  appId: "1:683337548594:web:b0d321f35c48b23cabcd2b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'orcamento2026');

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const LOCKED = [0,1,2];
const MJJ = [4,5,6];

const BUDGET_PADRAO = {
  'CASA': [{name:'Aluguel',orcado:2780},{name:'Luz',orcado:250},{name:'Supermercado',orcado:1650},{name:'Lavanderia',orcado:100},{name:'Celular',orcado:60},{name:'Itens para casa',orcado:100}],
  'SAUDE': [{name:'Barbeiro',orcado:100},{name:'Terapia',orcado:1050}],
  'LAZER': [{name:'Lazer geral',orcado:1000},{name:'Comida fora (VR)',orcado:207}],
  'TRANSPORTE': [{name:'Uber pessoal',orcado:200}],
  'TRABALHO': [{name:'Alimentação trabalho (VR)',orcado:500},{name:'Almoço trabalho (crédito)',orcado:200},{name:'Transporte trabalho',orcado:0}],
  'INVESTIMENTO': [{name:'Aporte mensal',orcado:1200}],
  'VIAGEM': [{name:'Fundo RJ SP',orcado:200}],
  'ASSINATURAS': [{name:'ChatGPT',orcado:100}],
};

const BUDGET_MJJ = {
  'CASA': [{name:'Aluguel',orcado:2780},{name:'Luz',orcado:150},{name:'Supermercado',orcado:1650},{name:'Lavanderia',orcado:100},{name:'Celular',orcado:60},{name:'Itens para casa',orcado:0}],
  'SAUDE': [{name:'Barbeiro',orcado:0},{name:'Terapia',orcado:1050}],
  'LAZER': [{name:'Lazer geral',orcado:733},{name:'Comida fora (VR)',orcado:207}],
  'TRANSPORTE': [{name:'Uber pessoal',orcado:200}],
  'TRABALHO': [{name:'Alimentação trabalho (VR)',orcado:500},{name:'Almoço trabalho (crédito)',orcado:200},{name:'Transporte trabalho',orcado:0}],
  'INVESTIMENTO': [{name:'Aporte mensal',orcado:1200}],
  'VIAGEM': [{name:'Fundo RJ SP',orcado:200}],
  'ASSINATURAS': [{name:'ChatGPT',orcado:100}],
  'RESTITUICAO': [{name:'Ajuste de caixa (fev)',orcado:567}],
};

const EMOJIS = {'CASA':'🏠','SAUDE':'🧘','LAZER':'🎯','TRANSPORTE':'🚗','TRABALHO':'💼','INVESTIMENTO':'📈','VIAGEM':'✈️','ASSINATURAS':'💳','RESTITUICAO':'🔁'};
const LABELS = {'CASA':'CASA','SAUDE':'SAÚDE','LAZER':'LAZER','TRANSPORTE':'TRANSPORTE','TRABALHO':'TRABALHO','INVESTIMENTO':'INVESTIMENTO','VIAGEM':'VIAGEM','ASSINATURAS':'ASSINATURAS','RESTITUICAO':'RESTITUIÇÃO'};

function getBudget(i) { return MJJ.includes(i) ? BUDGET_MJJ : BUDGET_PADRAO; }

function defaultMonth(i) {
  const budget = getBudget(i);
  const locked = LOCKED.includes(i);
  const data = { payments: {VA:0,VR:0,Credito:0,Dinheiro:0}, categories: {} };
  for (const [cat, items] of Object.entries(budget)) {
    data.categories[cat] = items.map(it => ({name:it.name, orcado:it.orcado, realizado:locked?it.orcado:0}));
  }
  if (locked) {
    const total = Object.values(data.categories).flat().reduce((s,it)=>s+it.orcado,0);
    data.payments['Credito'] = total;
  }
  return data;
}

function defaultState() {
  const st = { months: {}, history: [] };
  for (let i = 0; i < 12; i++) st.months[i] = defaultMonth(i);
  return st;
}

let state = defaultState();
let currentTab = 3;
let isSaving = false;

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  if (s==='synced') { el.textContent='✅ Sincronizado'; el.className='sync-status synced'; }
  else if (s==='syncing') { el.textContent='⏳ Salvando...'; el.className='sync-status syncing'; }
  else { el.textContent='❌ Erro sync'; el.className='sync-status error'; }
}

async function saveToFirebase() {
  if (isSaving) return;
  isSaving = true;
  setSyncStatus('syncing');
  try {
    await set(dbRef, JSON.parse(JSON.stringify(state)));
    setSyncStatus('synced');
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
  }
  isSaving = false;
}

// Listen realtime
onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state = data;
    if (!state.history) state.history = [];
    render();
    setSyncStatus('synced');
  } else {
    saveToFirebase();
  }
}, (error) => {
  console.error('DB error:', error);
  setSyncStatus('error');
});

window.resetAll = function() {
  if (!confirm('Tem certeza? Apaga tudo em todos os dispositivos.')) return;
  state = defaultState();
  saveToFirebase();
};

function fmt(n) { return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtR(n) { return 'R$\u00a0'+fmt(n); }
function getTotal(data,field) { return Object.values(data.categories||{}).flat().reduce((s,i)=>s+(i[field]||0),0); }
function catTotal(items,field) { return (items||[]).reduce((s,i)=>s+(i[field]||0),0); }

// ── FORM ─────────────────────────────────────────────────────────────────────
window.updateSubcats = function() {
  const monthIdx = parseInt(document.getElementById('fMonth').value);
  const cat = document.getElementById('fCat').value;
  const sub = document.getElementById('fSub');
  const data = state.months[monthIdx];
  sub.innerHTML = '';
  if (data && data.categories && data.categories[cat]) {
    data.categories[cat].forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.name; opt.textContent = item.name;
      sub.appendChild(opt);
    });
  }
};

window.populateCats = function() {
  const monthIdx = parseInt(document.getElementById('fMonth').value);
  const data = state.months[monthIdx];
  const cat = document.getElementById('fCat');
  const prev = cat.value;
  cat.innerHTML = '';
  if (data && data.categories) {
    Object.keys(data.categories).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = (EMOJIS[c]||'')+' '+(LABELS[c]||c);
      cat.appendChild(opt);
    });
    if (prev && cat.querySelector(`option[value="${prev}"]`)) cat.value = prev;
  }
  updateSubcats();
};

function populateMonthSelect() {
  const sel = document.getElementById('fMonth');
  const prev = sel.value;
  sel.innerHTML = '';
  MONTHS.forEach((m, i) => {
    if (LOCKED.includes(i)) return;
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = m;
    if (i === (typeof currentTab==='number' ? currentTab : 3)) opt.selected = true;
    sel.appendChild(opt);
  });
  if (prev && sel.querySelector(`option[value="${prev}"]`)) sel.value = prev;
  populateCats();
}

window.submitLaunch = function() {
  const monthIdx = parseInt(document.getElementById('fMonth').value);
  if (LOCKED.includes(monthIdx)) { showMsg('Este mês está concluído.','error'); return; }
  const cat = document.getElementById('fCat').value;
  const sub = document.getElementById('fSub').value;
  const val = parseFloat(document.getElementById('fVal').value);
  const payLabel = document.getElementById('fPay').value;
  const payKey = payLabel === 'Crédito' ? 'Credito' : payLabel;
  if (!val || val <= 0) { showMsg('Informe um valor válido.','error'); return; }
  const data = state.months[monthIdx];
  const item = data.categories[cat]?.find(i => i.name === sub);
  if (!item) { showMsg('Subcategoria não encontrada.','error'); return; }
  item.realizado = (item.realizado||0) + val;
  data.payments[payKey] = (data.payments[payKey]||0) + val;
  state.history = state.history || [];
  state.history.unshift({ month: MONTHS[monthIdx], cat, sub, val, pay: payLabel, date: new Date().toLocaleDateString('pt-BR') });
  if (state.history.length > 50) state.history = state.history.slice(0,50);
  saveToFirebase();
  render();
  document.getElementById('fVal').value = '';
  showMsg('✅ '+fmtR(val)+' lançado em '+sub,'success');
};

function showMsg(text, type) {
  const el = document.getElementById('formMsg');
  el.textContent = text; el.className = type;
  setTimeout(()=>{el.textContent='';el.className='';},3000);
}

function renderHistory() {
  const el = document.getElementById('launchHistory');
  if (!state.history || state.history.length===0) { el.innerHTML=''; return; }
  el.innerHTML = '<h4>Últimos lançamentos</h4>' +
    state.history.slice(0,8).map(h=>
      `<div class="history-item">
        <div><div>${h.sub}</div><div class="h-name">${h.month} · ${h.pay} · ${h.date}</div></div>
        <div class="h-val">${fmtR(h.val)}</div>
      </div>`
    ).join('');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  const at = document.createElement('div');
  at.className = 'tab'+(currentTab==='annual'?' active':'');
  at.textContent = '📊 Anual';
  at.onclick = ()=>{currentTab='annual';render();};
  el.appendChild(at);
  MONTHS.forEach((m,i)=>{
    const t = document.createElement('div');
    t.className = 'tab'+(LOCKED.includes(i)?' locked':'')+(currentTab===i?' active':'');
    t.textContent = m.slice(0,3).toUpperCase();
    t.onclick = ()=>{currentTab=i;render();};
    el.appendChild(t);
  });
}

function renderMonth(idx) {
  const data = state.months[idx];
  if (!data) return;
  const locked = LOCKED.includes(idx);
  const orc=getTotal(data,'orcado'),real=getTotal(data,'realizado'),saldo=orc-real;
  const payMap = {'VA':'VA','VR':'VR','Credito':'Crédito','Dinheiro':'Dinheiro'};
  let html=`
    <div class="month-header">
      <div class="month-title">📅 ${MONTHS[idx].toUpperCase()} / 2026</div>
      <div class="month-badge ${locked?'locked':''}">${locked?'✅ Concluído':'🔄 Em andamento'}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Orçado</div><div class="s-value c-a">${fmtR(orc)}</div></div>
      <div class="summary-card"><div class="s-label">Realizado</div><div class="s-value c-b">${fmtR(real)}</div></div>
      <div class="summary-card"><div class="s-label">Saldo</div><div class="s-value ${saldo>=0?'c-c':'c-d'}">${fmtR(saldo)}</div></div>
    </div>
    <div class="payment-grid">
      ${Object.entries(payMap).map(([k,label])=>`
        <div class="payment-card">
          <div class="p-label">${label}</div>
          <div class="p-value ${(data.payments[k]||0)>0?'c-b':'zero'}">${fmtR(data.payments[k]||0)}</div>
        </div>`).join('')}
    </div>`;
  for (const [cat,items] of Object.entries(data.categories||{})) {
    const co=catTotal(items,'orcado'),cr=catTotal(items,'realizado'),cs=co-cr;
    html+=`
      <div class="section">
        <div class="section-title">${EMOJIS[cat]||''} ${LABELS[cat]||cat}</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Subcategoria</th><th>Orçado</th><th>Realizado</th><th>Saldo</th></tr></thead>
          <tbody>
            ${(items||[]).map(it=>{const s=it.orcado-it.realizado;return`<tr>
              <td>${it.name}</td><td class="c-m">${fmt(it.orcado)}</td>
              <td class="${it.realizado===0?'zero':'amt'}">${fmt(it.realizado)}</td>
              <td class="${s>0?'pos':s<0?'neg':'zero'}">${fmt(s)}</td>
            </tr>`;}).join('')}
            <tr class="total-row"><td>TOTAL ${LABELS[cat]||cat}</td><td>${fmt(co)}</td><td>${fmt(cr)}</td><td>${fmt(cs)}</td></tr>
          </tbody>
        </table></div>
      </div>`;
  }
  document.getElementById('budgetPanel').innerHTML = html;
  populateMonthSelect();
  renderHistory();
}

function renderAnnual() {
  let to=0,tr=0;
  for(let i=0;i<12;i++){to+=getTotal(state.months[i],'orcado');tr+=getTotal(state.months[i],'realizado');}
  let html=`
    <div class="month-title" style="margin-bottom:12px">📊 VISÃO ANUAL — 2026</div>
    <div class="summary-grid" style="margin-bottom:14px">
      <div class="summary-card"><div class="s-label">Total Orçado</div><div class="s-value c-a">${fmtR(to)}</div></div>
      <div class="summary-card"><div class="s-label">Total Realizado</div><div class="s-value c-b">${fmtR(tr)}</div></div>
      <div class="summary-card"><div class="s-label">Saldo Anual</div><div class="s-value c-c">${fmtR(to-tr)}</div></div>
    </div><div class="annual-grid">`;
  for(let i=0;i<12;i++){
    const d=state.months[i],o=getTotal(d,'orcado'),r=getTotal(d,'realizado'),s=o-r;
    const pct=o>0?Math.min(100,(r/o)*100):0;
    const color=pct>=100?'var(--danger)':pct>70?'var(--accent3)':'var(--accent2)';
    html+=`<div class="annual-card" onclick="currentTab=${i};render()">
      <div class="a-month">${MONTHS[i]} ${LOCKED.includes(i)?'✅':MJJ.includes(i)?'📋':''}</div>
      <div class="a-row"><span class="a-lbl">Orçado</span><span class="c-a">${fmtR(o)}</span></div>
      <div class="a-row"><span class="a-lbl">Realizado</span><span class="c-b">${fmtR(r)}</span></div>
      <div class="a-row"><span class="a-lbl">Saldo</span><span class="${s>=0?'c-c':'c-d'}">${fmtR(s)}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('budgetPanel').innerHTML = html;
  populateMonthSelect();
  renderHistory();
}

window.render = function() { renderTabs(); currentTab==='annual'?renderAnnual():renderMonth(currentTab); };

render();
</script>
</body>
</html>
